<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDA算法演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .input-group {
            margin: 10px 0;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        .input-group label {
            font-weight: bold;
            margin-right: 10px;
        }
        .input-group input {
            width: 80px;
            padding: 5px;
            margin: 0 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .input-group button {
            padding: 6px 12px;
            margin-left: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .input-group button:hover {
            background-color: #45a049;
        }
        .controls {
            margin: 10px 0;
        }
        .controls button {
            padding: 8px 16px;
            font-size: 14px;
            margin-right: 10px;
            cursor: pointer;
        }
        #stepInfo {
            margin-left: 20px;
            font-size: 14px;
        }
        canvas {
            border: 1px solid #ccc;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="input-group">
        <label>起点:</label>
        X: <input type="number" id="startX" value="50" min="0" max="600">
        Y: <input type="number" id="startY" value="80" min="0" max="600">
        <label style="margin-left: 20px;">终点:</label>
        X: <input type="number" id="endX" value="520" min="0" max="600">
        Y: <input type="number" id="endY" value="130" min="0" max="600">
        <button id="applyBtn">应用</button>
    </div>
    <div class="controls">
        <button id="prevBtn">上一步</button>
        <button id="nextBtn">下一步</button>
        <button id="resetBtn">重置</button>
        <span id="stepInfo"></span>
    </div>
    <canvas id="c" width="1000" height="600"></canvas>
    <script>
const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

// ===== 网格参数 =====
const cols = 10
const rows = 10
const size = 60

// ===== 线段 =====
let start = { x: 50, y: 80 }
let end   = { x: 520, y: 130 }

let dx = end.x - start.x
let dy = end.y - start.y

// ===== 初始状态 =====
let initCol = Math.floor(start.x / size)
let initRow = Math.floor(start.y / size)

let endCol = Math.floor(end.x / size)
let endRow = Math.floor(end.y / size)

let stepCol = dx >= 0 ? 1 : -1
let stepRow = dy >= 0 ? 1 : -1

// ===== 计算初始 tMax =====
function calcInitTMaxX() {
    if (Math.abs(dx) < 1e-6) return Infinity
    const nextX = stepCol > 0 ? (initCol + 1) * size : initCol * size
    return (nextX - start.x) / dx
}

function calcInitTMaxY() {
    if (Math.abs(dy) < 1e-6) return Infinity
    const nextY = stepRow > 0 ? (initRow + 1) * size : initRow * size
    return (nextY - start.y) / dy
}

let tDeltaX = Math.abs(dx) < 1e-6 ? Infinity : size / Math.abs(dx)
let tDeltaY = Math.abs(dy) < 1e-6 ? Infinity : size / Math.abs(dy)

// ===== 当前状态 =====
let col = initCol
let row = initRow
let tMaxX = calcInitTMaxX()
let tMaxY = calcInitTMaxY()

// ===== 历史记录（用于上一步） =====
let history = []
let currentStep = 0
let pathHistory = [] // 记录所有经过的路径和对应的tMax值

function saveState() {
    history.push({ col, row, tMaxX, tMaxY })
    // 保存路径信息（包括当前格子和对应的tMax值）
    pathHistory.push({ 
        col, 
        row, 
        tMaxX: tMaxX.toFixed(3), 
        tMaxY: tMaxY.toFixed(3),
        step: currentStep
    })
}

// 保存初始状态
saveState()

// ===== 动画 =====
function draw() {
    ctx.clearRect(0,0,1000,600)

    // 网格
    ctx.strokeStyle = "#ccc"
    for (let i=0;i<=cols;i++) {
        ctx.beginPath()
        ctx.moveTo(i*size,0)
        ctx.lineTo(i*size,600)
        ctx.stroke()
    }
    for (let j=0;j<=rows;j++) {
        ctx.beginPath()
        ctx.moveTo(0,j*size)
        ctx.lineTo(600,j*size)
        ctx.stroke()
    }

    // 线段
    ctx.strokeStyle = "black"
    ctx.beginPath()
    ctx.moveTo(start.x, start.y)
    ctx.lineTo(end.x, end.y)
    ctx.stroke()

    // 绘制历史路径上的格子（不显示文字）
    for (let i = 0; i < pathHistory.length; i++) {
        const path = pathHistory[i]
        const isCurrent = (i === pathHistory.length - 1)
        
        // 当前格子用较深的绿色，历史格子用浅绿色
        if (isCurrent) {
            ctx.fillStyle = "rgba(0,255,0,0.3)"
        } else {
            ctx.fillStyle = "rgba(0,200,0,0.1)"
        }
        ctx.fillRect(path.col * size, path.row * size, size, size)
        
        // 当前格子加绿色边框
        if (isCurrent) {
            ctx.strokeStyle = "green"
            ctx.lineWidth = 2
            ctx.strokeRect(path.col * size, path.row * size, size, size)
            ctx.lineWidth = 1
        }
    }

    // ===== 画 tMaxX / tMaxY 矢量 =====
    const px = start.x + dx * tMaxX
    const py = start.y + dy * tMaxX

    const qx = start.x + dx * tMaxY
    const qy = start.y + dy * tMaxY

    // 绘制箭头的辅助函数
    function drawArrow(fromX, fromY, toX, toY, color, label) {
        ctx.save()
        
        // 绘制线段
        ctx.strokeStyle = color
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.moveTo(fromX, fromY)
        ctx.lineTo(toX, toY)
        ctx.stroke()
        
        // 计算箭头角度
        const angle = Math.atan2(toY - fromY, toX - fromX)
        const arrowLength = 10
        const arrowAngle = Math.PI / 6
        
        // 绘制箭头头部
        ctx.fillStyle = color
        ctx.beginPath()
        ctx.moveTo(toX, toY)
        ctx.lineTo(
            toX - arrowLength * Math.cos(angle - arrowAngle),
            toY - arrowLength * Math.sin(angle - arrowAngle)
        )
        ctx.lineTo(
            toX - arrowLength * Math.cos(angle + arrowAngle),
            toY - arrowLength * Math.sin(angle + arrowAngle)
        )
        ctx.closePath()
        ctx.fill()
        
        // 在箭头末端绘制点
        ctx.beginPath()
        ctx.arc(toX, toY, 5, 0, Math.PI*2)
        ctx.fill()
        
        // 在箭头旁边标注
        ctx.fillStyle = color
        ctx.font = "12px Arial"
        const offsetX = 10
        const offsetY = -10
        ctx.fillText(label, toX + offsetX, toY + offsetY)
        
        ctx.restore()
    }

    // 只显示当前步骤中较小的t值对应的矢量
    if (tMaxX < tMaxY) {
        // 绘制tMaxX矢量（红色）- 当前步骤选择X方向
        drawArrow(start.x, start.y, px, py, "red", `tMaxX=${tMaxX.toFixed(2)}`)
    } else if (tMaxY < tMaxX) {
        // 绘制tMaxY矢量（蓝色）- 当前步骤选择Y方向
        drawArrow(start.x, start.y, qx, qy, "blue", `tMaxY=${tMaxY.toFixed(2)}`)
    } else {
        // 相等时显示两个矢量（极少见情况）
        drawArrow(start.x, start.y, px, py, "red", `tMaxX=${tMaxX.toFixed(2)}`)
        drawArrow(start.x, start.y, qx, qy, "blue", `tMaxY=${tMaxY.toFixed(2)}`)
    }

    // 文字
    ctx.fillStyle = "black"
    ctx.font = "16px Arial"
    
    // 获取文字宽度以便右对齐
    const tMaxXText = "tMaxX: " + tMaxX.toFixed(2)
    const tMaxYText = "tMaxY: " + tMaxY.toFixed(2)
    const tDeltaXText = "tDeltaX: " + tDeltaX.toFixed(3)
    const tDeltaYText = "tDeltaY: " + tDeltaY.toFixed(3)
    
    const tMaxXWidth = ctx.measureText(tMaxXText).width
    const tMaxYWidth = ctx.measureText(tMaxYText).width
    const tDeltaXWidth = ctx.measureText(tDeltaXText).width
    const tDeltaYWidth = ctx.measureText(tDeltaYText).width
    
    // 在右上角显示，距离右边和上边各留10px边距
    ctx.fillText(tMaxXText, 1000 - tMaxXWidth - 10, 20)
    ctx.fillText(tMaxYText, 1000 - tMaxYWidth - 10, 40)
    
    // 显示tDelta参数（在tMax下方）
    ctx.fillStyle = "black"
    ctx.font = "16px Arial"
    ctx.fillText(tDeltaXText, 1000 - tDeltaXWidth - 10, 65)
    ctx.fillText(tDeltaYText, 1000 - tDeltaYWidth - 10, 80)
    
    // ===== 显示计算过程 =====
    const calcX = 650  // 计算过程显示位置
    const calcY = 20
    
    ctx.fillStyle = "#2c3e50"
    ctx.font = "bold 16px Arial"
    ctx.textAlign = "left"
    ctx.fillText("计算过程：", calcX, calcY)
    
    ctx.fillStyle = "#34495e"
    ctx.font = "14px Arial"
    let lineY = calcY + 25
    const lineHeight = 20
    
    // 基本参数
    ctx.fillText(`起点: (${start.x}, ${start.y})`, calcX, lineY)
    lineY += lineHeight
    ctx.fillText(`终点: (${end.x}, ${end.y})`, calcX, lineY)
    lineY += lineHeight
    ctx.fillText(`网格大小: ${size}`, calcX, lineY)
    lineY += lineHeight + 5
    
    // dx, dy计算
    ctx.fillStyle = "#16a085"
    ctx.font = "bold 14px Arial"
    ctx.fillText("步骤1: 计算方向向量", calcX, lineY)
    ctx.fillStyle = "#34495e"
    ctx.font = "14px Arial"
    lineY += lineHeight
    ctx.fillText(`dx = ${end.x} - ${start.x} = ${dx}`, calcX + 10, lineY)
    lineY += lineHeight
    ctx.fillText(`dy = ${end.y} - ${start.y} = ${dy}`, calcX + 10, lineY)
    lineY += lineHeight + 5
    
    // 初始格子
    ctx.fillStyle = "#16a085"
    ctx.font = "bold 14px Arial"
    ctx.fillText("步骤2: 确定初始格子", calcX, lineY)
    ctx.fillStyle = "#34495e"
    ctx.font = "14px Arial"
    lineY += lineHeight
    ctx.fillText(`起点格子: (${initCol}, ${initRow})`, calcX + 10, lineY)
    lineY += lineHeight
    ctx.fillText(`终点格子: (${endCol}, ${endRow})`, calcX + 10, lineY)
    lineY += lineHeight
    ctx.fillText(`步进方向: (${stepCol}, ${stepRow})`, calcX + 10, lineY)
    lineY += lineHeight + 5
    
    // tDelta计算
    ctx.fillStyle = "#16a085"
    ctx.font = "bold 14px Arial"
    ctx.fillText("步骤3: 计算tDelta", calcX, lineY)
    ctx.fillStyle = "#34495e"
    ctx.font = "14px Arial"
    lineY += lineHeight
    
    if (Math.abs(dx) < 1e-6) {
        ctx.fillText(`tDeltaX = ∞ (dx ≈ 0)`, calcX + 10, lineY)
    } else {
        ctx.fillText(`tDeltaX = ${size} / |${dx}| = ${tDeltaX.toFixed(3)}`, calcX + 10, lineY)
    }
    lineY += lineHeight
    
    if (Math.abs(dy) < 1e-6) {
        ctx.fillText(`tDeltaY = ∞ (dy ≈ 0)`, calcX + 10, lineY)
    } else {
        ctx.fillText(`tDeltaY = ${size} / |${dy}| = ${tDeltaY.toFixed(3)}`, calcX + 10, lineY)
    }
    lineY += lineHeight + 5
    
    // tMax初始值计算
    ctx.fillStyle = "#16a085"
    ctx.font = "bold 14px Arial"
    ctx.fillText("步骤4: 计算初始tMax", calcX, lineY)
    ctx.fillStyle = "#34495e"
    ctx.font = "14px Arial"
    lineY += lineHeight
    
    // tMaxX初始计算
    const nextX = stepCol > 0 ? (initCol + 1) * size : initCol * size
    const initTMaxX = calcInitTMaxX()
    if (Math.abs(dx) < 1e-6) {
        ctx.fillText(`tMaxX初始 = ∞ (dx ≈ 0)`, calcX + 10, lineY)
    } else {
        ctx.fillText(`下一X边界 = ${nextX}`, calcX + 10, lineY)
        lineY += lineHeight
        ctx.fillText(`tMaxX初始 = (${nextX} - ${start.x}) / ${dx}`, calcX + 10, lineY)
        lineY += lineHeight
        ctx.fillText(`       = ${initTMaxX.toFixed(3)}`, calcX + 10, lineY)
        lineY -= lineHeight
    }
    lineY += lineHeight
    
    // tMaxY初始计算
    const nextY = stepRow > 0 ? (initRow + 1) * size : initRow * size
    const initTMaxY = calcInitTMaxY()
    if (Math.abs(dy) < 1e-6) {
        ctx.fillText(`tMaxY初始 = ∞ (dy ≈ 0)`, calcX + 10, lineY)
    } else {
        ctx.fillText(`下一Y边界 = ${nextY}`, calcX + 10, lineY)
        lineY += lineHeight
        ctx.fillText(`tMaxY初始 = (${nextY} - ${start.y}) / ${dy}`, calcX + 10, lineY)
        lineY += lineHeight
        ctx.fillText(`       = ${initTMaxY.toFixed(3)}`, calcX + 10, lineY)
        lineY -= lineHeight
    }
    lineY += lineHeight + 5
    
    // 当前tMax值（如果已经移动过）
    if (currentStep > 0) {
        ctx.fillStyle = "#e74c3c"
        ctx.font = "bold 14px Arial"
        ctx.fillText(`当前步骤 ${currentStep}:`, calcX, lineY)
        ctx.fillStyle = "#34495e"
        ctx.font = "14px Arial"
        lineY += lineHeight
        ctx.fillText(`tMaxX当前 = ${tMaxX.toFixed(3)}`, calcX + 10, lineY)
        lineY += lineHeight
        ctx.fillText(`tMaxY当前 = ${tMaxY.toFixed(3)}`, calcX + 10, lineY)
        lineY += lineHeight
        
        if (tMaxX < tMaxY) {
            ctx.fillStyle = "#e74c3c"
            ctx.fillText(`→ 选择X方向 (tMaxX < tMaxY)`, calcX + 10, lineY)
        } else if (tMaxY < tMaxX) {
            ctx.fillStyle = "#3498db"
            ctx.fillText(`→ 选择Y方向 (tMaxY < tMaxX)`, calcX + 10, lineY)
        } else {
            ctx.fillText(`→ tMaxX = tMaxY`, calcX + 10, lineY)
        }
    }
    
    ctx.textAlign = "center"  // 恢复默认对齐方式
    
    // 更新步数信息
    updateStepInfo()
}

function updateStepInfo() {
    const stepInfo = document.getElementById("stepInfo")
    const isEnd = col === endCol && row === endRow
    stepInfo.textContent = `步数: ${currentStep} | 当前格子: (${col}, ${row}) | 目标: (${endCol}, ${endRow})${isEnd ? ' ✓ 已到达' : ''}`
}

function stepForward() {
    if (col === endCol && row === endRow) return false

    // 先移动到下一个格子
    if (tMaxX < tMaxY) {
        col += stepCol
        tMaxX += tDeltaX
    } else {
        row += stepRow
        tMaxY += tDeltaY
    }
    
    currentStep++
    // 移动后保存新位置的状态
    saveState()
    return true
}

function stepBackward() {
    if (currentStep <= 0) return false
    
    currentStep--
    const state = history[currentStep]
    col = state.col
    row = state.row
    tMaxX = state.tMaxX
    tMaxY = state.tMaxY
    
    // 移除后面的历史
    history = history.slice(0, currentStep + 1)
    pathHistory = pathHistory.slice(0, currentStep + 1)
    return true
}

function reset() {
    col = initCol
    row = initRow
    tMaxX = calcInitTMaxX()
    tMaxY = calcInitTMaxY()
    history = []
    pathHistory = []
    currentStep = 0
    saveState()
    draw()
}

// ===== 按钮事件 =====
document.getElementById("prevBtn").addEventListener("click", () => {
    stepBackward()
    draw()
})

document.getElementById("nextBtn").addEventListener("click", () => {
    stepForward()
    draw()
})

document.getElementById("resetBtn").addEventListener("click", reset)

document.getElementById("applyBtn").addEventListener("click", () => {
    // 获取输入值
    const newStartX = parseInt(document.getElementById("startX").value) || 50
    const newStartY = parseInt(document.getElementById("startY").value) || 80
    const newEndX = parseInt(document.getElementById("endX").value) || 520
    const newEndY = parseInt(document.getElementById("endY").value) || 130
    
    // 限制范围
    start.x = Math.max(0, Math.min(600, newStartX))
    start.y = Math.max(0, Math.min(600, newStartY))
    end.x = Math.max(0, Math.min(600, newEndX))
    end.y = Math.max(0, Math.min(600, newEndY))
    
    // 更新输入框显示（如果超出范围）
    document.getElementById("startX").value = start.x
    document.getElementById("startY").value = start.y
    document.getElementById("endX").value = end.x
    document.getElementById("endY").value = end.y
    
    // 重新计算参数
    dx = end.x - start.x
    dy = end.y - start.y
    
    initCol = Math.floor(start.x / size)
    initRow = Math.floor(start.y / size)
    
    endCol = Math.floor(end.x / size)
    endRow = Math.floor(end.y / size)
    
    stepCol = dx >= 0 ? 1 : -1
    stepRow = dy >= 0 ? 1 : -1
    
    tDeltaX = Math.abs(dx) < 1e-6 ? Infinity : size / Math.abs(dx)
    tDeltaY = Math.abs(dy) < 1e-6 ? Infinity : size / Math.abs(dy)
    
    // 重置状态
    reset()
})

draw()
    </script>
</body>
</html>
