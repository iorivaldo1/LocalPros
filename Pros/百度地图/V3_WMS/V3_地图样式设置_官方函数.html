<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="/Public/js/jquery-3.7.1.min.js"></script>
  <script src="/Public/js/baiduUtills.js"></script>
  <title>百度地图初始页面</title>
  <style>
    html,
    body,
    #map {
      position: relative;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    #testButton {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 100px;
      height: 30px;
      background-color: blue;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <button id="testButton">测试按钮</button>

  <script src="https://api.map.baidu.com/api?v=3.0&ak=MUBHlQKKLvig0Ia3QEAOzio46qq6foiT"></script>
  <script>
    const map = new BMap.Map("map");
    const center = new BMap.Point(104, 30.7);
    map.centerAndZoom(center, 12);
    map.enableScrollWheelZoom(true);

    //初始化显示的图层设置
    // map.setMapStyleV2({
    //   styleJson: [
    //     { "featureType": "districtlabel", "elementType": "all", "stylers": { "visibility": "off" } },
    //     { "featureType": "poilabel", "elementType": "all", "stylers": { "visibility": "off" } },
    //     { "featureType": "road", "elementType": "all", "stylers": { "visibility": "off" } },
    //     { "featureType": "building", "elementType": "all", "stylers": { "visibility": "off" } },
    //     { "featureType": "water", "elementType": "all", "stylers": { "visibility": "off" } },
    //     { "featureType": "green", "elementType": "all", "stylers": { "visibility": "off" } },
    //     { "featureType": "land", "elementType": "all", "stylers": { "visibility": "off" } },
    //   ]
    // });

    var geoServerWMTSLayer = new BMap.TileLayer({
      isTransparentPng: true, // 允许加载透明 PNG（适用于业务叠加层）
    });

    let wmtsDebugCount = 0;
    geoServerWMTSLayer.getTilesUrl = function (tileCoord, zoom) {
      //tileCoord是瓦片的索引

      /*底层计算tileCoord过程:
      从 BD-09MC（百度墨卡托）直接算:
      tileCoord.x = Math.floor(mercX / (256 * res));
      tileCoord.y = Math.floor(mercY / (256 * res));
      */

      // wmtsDebugCount++;
      // console.log('zoom:', zoom, 'wmtsDebugCount:', wmtsDebugCount);
      var x = tileCoord.x;
      var y = tileCoord.y;

      //百度设置的分辨率计算公式, 18 为百度地图的固定值
      //以 zoom=18 为基准，每降低一级缩放，地图缩小一半，1像素代表的实际距离翻倍：
      //res是当前zoom下，1像素代表的实际距离
      var res = Math.pow(2, 18 - zoom);

      //瓦片左下角的百度墨卡托坐标
      var minX = x * 256 * res;
      var minY = y * 256 * res;
      var maxX = (x + 1) * 256 * res;
      var maxY = (y + 1) * 256 * res;
      // console.log('x:', x, 'y:', y, 'minX:', minX, 'minY:', minY, 'maxX:', maxX, 'maxY:', maxY);

      // 2. 将百度平面坐标转换为百度经纬度 (BD-09)
      // var proj = map.getMapType().getProjection();
      // var ptMin = proj.pointToLngLat(new BMap.Pixel(minX, minY));
      // var ptMax = proj.pointToLngLat(new BMap.Pixel(maxX, maxY));
      
      var ptMin = bd09mcToLngLat(minX, minY)
      var ptMax = bd09mcToLngLat(maxX,maxY)
      // console.log('官方 ptMin:', ptMin.lng, ptMin.lat, '| 自写:', testRes.lng, testRes.lat)

      // 3. 将 BD-09 经纬度转换为标准 WGS-84 经纬度
      var wgsMin = bd09ToWgs84(ptMin.lng, ptMin.lat);
      var wgsMax = bd09ToWgs84(ptMax.lng, ptMax.lat);

      // 4. 构建 GeoServer WMS 动态出图请求 URL (不再使用预切片的 WMTS)
      // 注意 URL 去掉了 gwc/service，直接访问原始 WMS
      var geoserverUrl = "http://127.0.0.1:8080/geoserver/wms";
      // var layerName = "WMS_DOM:sc_cut_4326_fixed"; // 替换为你的 workspace:layer_name
      var layerName = "WMS_XZQ:XZQ_SC"; // 替换为你的 workspace:layer_name


      // 构造 BBOX: minLng,minLat,maxLng,maxLat (WMS 1.1.0 标准 EPSG:4326 顺序)
      var bbox = wgsMin[0] + "," + wgsMin[1] + "," + wgsMax[0] + "," + wgsMax[1];

      var url = geoserverUrl +
        "?SERVICE=WMS" +
        "&VERSION=1.1.0" +
        "&REQUEST=GetMap" +
        "&FORMAT=image/png" +
        "&TRANSPARENT=true" +
        "&LAYERS=" + layerName +
        "&SRS=EPSG:4326" +
        "&WIDTH=256" +
        "&HEIGHT=256" +
        "&BBOX=" + bbox;

      return url;
    };


    map.addTileLayer(geoServerWMTSLayer);

    $("#testButton").click(function () {
      console.log(map.getZoom());
    });

  </script>
</body>

</html>
