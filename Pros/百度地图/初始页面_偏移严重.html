<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百度地图初始页面</title>
  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://api.map.baidu.com/api?v=3.0&ak=MUBHlQKKLvig0Ia3QEAOzio46qq6foiT"></script>
  <script>
    // 1. 初始化百度地图
    var map = new BMap.Map("map");
    map.centerAndZoom(new BMap.Point(103,30), 7); // 以北京为例
    map.enableScrollWheelZoom();

    // 2. 创建自定义的 TileLayer
    var geoServerWMTSLayer = new BMap.TileLayer({
      isTransparentPng: true // 允许加载透明 PNG（适用于业务叠加层）
    });

    // 3. 重写 getTilesUrl 方法（注意是 getTilesUrl，不是 getTileUrl）
    geoServerWMTSLayer.getTilesUrl = function (tileCoord, zoom) {
      var x = tileCoord.x;
      var y = tileCoord.y;
      var z = zoom;

      // 百度地图的缩放级别比标准的 Web Mercator (Google) 大 1 级
      var google_z = z - 1;

      // 将百度的瓦片行列号转换为标准的 Web Mercator 行列号
      var standardCol = x + Math.pow(2, google_z - 1);
      var standardRow = Math.pow(2, google_z - 1) - 1 - y;

      // 构建 GeoServer WMTS KVP 格式的请求 URL
      // TODO: 请替换为你自己的 GeoServer IP、端口、工作空间(workspace)和图层名(layer_name)
      var geoserverUrl = "http://127.0.0.1:8080/geoserver/gwc/service/wmts";
      var layerName = "WMTS_BAIDU:sc_baidu";
      var gridSetName = "EPSG:900913"; // 根据你 GeoServer 实际绑定的网格集名称修改

      var url = geoserverUrl + "?" +
        "SERVICE=WMTS&" +
        "REQUEST=GetTile&" +
        "VERSION=1.0.0&" +
        "LAYER=" + layerName + "&" +
        "STYLE=&" +
        "TILEMATRIXSET=" + gridSetName + "&" +
        "TILEMATRIX=" + gridSetName + ":" + google_z + "&" +    // 拼接缩放层级标识
        "TILEROW=" + standardRow + "&" +
        "TILECOL=" + standardCol + "&" +
        "FORMAT=image/png";

      return url;
    };


    // 4. 将 WMTS 服务图层叠加到百度地图实例上
    map.addTileLayer(geoServerWMTSLayer);
  </script>
</body>

</html>
