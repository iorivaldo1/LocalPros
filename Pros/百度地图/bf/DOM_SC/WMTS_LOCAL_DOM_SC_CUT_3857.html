<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Hello, World</title>
  <style type="text/css">
    html {
      height: 100%
    }

    body {
      height: 100%;
      margin: 0px;
      padding: 0px
    }

    #container {
      height: 100%
    }
  </style>
  <script type="text/javascript"
    src="https://api.map.baidu.com/api?v=1.0&type=webgl&ak=MUBHlQKKLvig0Ia3QEAOzio46qq6foiT">
    </script>
</head>

<body>
  <div id="container"></div>
  <script type="text/javascript">
    var map = new BMapGL.Map("container");
    map.enableScrollWheelZoom();

    var point = new BMapGL.Point(103, 30);
    map.centerAndZoom(point, 11);

    const wmtsURL = "http://127.0.0.1:8080/geoserver/gwc/service/wmts" + "?" +
      "SERVICE=WMTS&" +
      "REQUEST=GetTile&" +
      "VERSION=1.0.0&" +
      "LAYER=WMTS_BAIDU:1_fixed&" +
      "STYLE=&" +
      "TILEMATRIXSET=EPSG:900913&" +
      "TILEMATRIX=EPSG:900913:[z]&" +
      "TILEROW=[y]&" +
      "TILECOL=[x]&" +
      "FORMAT=image/png"

    var wmts = new BMapGL.XYZLayer({
      tileUrlTemplate: wmtsURL,
      useThumbData: true,
      extentCRSIsWGS84:true,
      extent:[97.34749306053061, 26.048207395253783,108.54256969463341, 34.31574984469135]
    });

    map.addTileLayer(wmts);

    // var test = new BMapGL.Boundary();
    // test.get("雨城区", function (rs) {
    //   wmts.addBoundary(rs.boundaries);
    // });
  </script>
</body>

</html>
