<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>河流中线ELE</title>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/tianditu.api.js"></script>
    <script src="/Public/js/wmtsTools.js"></script>
    <script src="/Public/js/echarts.min.js"></script>
    <link rel="stylesheet" href="/Public/css/0912.css">
</head>

<body>
    <div id="map"></div>
    <button id="t1">T</button>
    <div id="echart"></div>
    <!-- 坐标查询功能开关 -->
    <div id="coordSwitchButton">
        <span>显示坐标</span>
        <button class="switch">
            <span class="switch_circle circle_left"></span>
        </button>
    </div>

    <!-- 坐标信息显示框 -->
    <div id="coordInfoContainer">
        <span id="coord"></span>
    </div>
    <script>
        var lineTool;
        var m_pl = []
        var map = new T.Map('map', { maxZoom: 18 });
        map.centerAndZoom(new T.LngLat(102.755, 30.346), 15);

        var imageURL =
            'http://8.155.1.150:8080/geoserver/WMTS_F/gwc/service/wmts?' +
            'Request=GetTile' + 
            '&Service=WMTS' + 
            '&Version=1.0.0' + 
            '&LAYER=WMTS_F%3ARIVER_YA' + 
            '&STYLE=' + 
            '&Format=image%2Fpng' + 
            '&TILEMATRIXSET=EPSG%3A900913' + 
            '&TILEMATRIX=EPSG%3A900913%3A{z}' + 
            '&TILEROW={y}' + 
            '&TILECOL={x}' + 
            '&authkey=' + '9cdfeadf8dfd3b043'
        const southWest = new T.LngLat(101.9642680901, 28.862478591599995);
        const northEast = new T.LngLat(103.4113808093, 30.922261509850014);
        const f_bounds = new T.LngLatBounds(southWest, northEast);
        var lay = new T.TileLayer(imageURL, { minZoom: 1, maxZoom: 18, bounds: f_bounds });
        lay.setZIndex(1000)
        map.addLayer(lay);

        regShowCoord(map);
        var ctrl = new T.Control.MapType(
            { position: T_ANCHOR_BOTTOM_RIGHT }
        );
        map.addControl(ctrl);

        $('#t1').on('click', HD1)

        var chartDom = document.getElementById("echart");
        var myChart = echarts.init(chartDom);
        var option;

        function HD1() {
            if (m_pl.length > 0) {
                lineTool.clear();
                lineTool.close();
                m_pl = []
            }

            lineTool = new T.PolylineTool(map);
            lineTool.open();
            lineTool.addEventListener('draw', (e) => {
                e.currentLnglats.forEach(p => {
                    var p_coord = [p.lng, p.lat]
                    m_pl.push(p_coord)
                })

                var div_disList = [0]
                for (let i = 0; i < m_pl.length -1; i++) {
                    var p_dis = Math.round(calculateProjectedDistance(m_pl[0],m_pl[i+1]),2)
                    div_disList.push(p_dis)
                }

                async function getEleList() {
                    const concurrency = 3;
                    const elevationList = [];
                    const promises = m_pl.map(np => () => {
                        return new Promise((resolve, reject) => {
                            var zoom = map.getZoom();
                            var res = calculatePixelInTileCorrected(np[0], np[1], zoom, 'EPSG:900913');
                            var wmtsUrl = 'http://8.155.1.150:8080/geoserver/WMTS_DEM/gwc/service/wmts'; // WMTS服务地址
                            var url = wmtsUrl + '?' +
                                'REQUEST=GetFeatureInfo' +
                                '&VERSION=1.0.0' +
                                '&LAYER=WMTS_DEM%3ADEM_SC_4326' +
                                '&STYLE=' +
                                '&TILEMATRIX=EPSG:900913:' + zoom +
                                '&TILEMATRIXSET=EPSG:900913' +
                                '&SERVICE=WMTS' +
                                '&FORMAT=image/png' +
                                '&INFOFORMAT=application/json' +
                                '&TileCol=' + res.tileX +
                                '&TileRow=' + res.tileY +
                                '&I=' + Math.floor(res.pixelInTileX) +
                                '&J=' + Math.floor(res.pixelInTileY);

                            $.get(url).then(response => {
                                resolve(response.features[0].properties.GRAY_INDEX);
                            })
                        });
                    });
                    const executePromises = async (promises, concurrency) => {
                        const results = [];
                        for (let i = 0; i < promises.length; i += concurrency) {
                            const chunk = promises.slice(i, i + concurrency);
                            const chunkResults = await Promise.all(chunk.map(p => p()));
                            results.push(...chunkResults);
                        }
                        return results;
                    };

                    const results = await executePromises(promises, concurrency);
                    results.forEach(result => {
                        if (result) {
                            elevationList.push(result);
                        }
                    });

                    return elevationList;
                }

                getEleList().then(res => {
                    option = {
                        title:{
                            text:'Test',
                            left:'center'
                        },

                        backgroundColor: {
                            type: 'radial',
                            x: 0.5,
                            y: 0.5,
                            r: 0.5,
                            colorStops: [{
                                offset: 0, color: 'rgb(255, 255, 255)' // 中心颜色
                            }, {
                                offset: 1, color: 'rgb(240, 240, 255)' // 边缘颜色
                            }]
                        },

                        xAxis: {
                            type: 'category',
                            data: div_disList,
                            splitLine: {
                                show: true, // 显示网格线
                                // lineStyle: {
                                //     color: '#ddd',
                                //     type: 'solid'
                                // }
                            }
                        },
                        yAxis: {
                            type: 'value',
                            min: Math.min(...res),
                            max: Math.max(...res),
                        },
                        series: [
                            {
                                data: res,
                                type: 'line',
                                symbol:'none'
                            },
                        ]
                    };

                    myChart.setOption(option);
                });

                lineTool.close();
            })
        }


    </script>
</body>

</html>
