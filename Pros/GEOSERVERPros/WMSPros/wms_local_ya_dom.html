<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>天地图加载GeoServer WMS</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        var map = new T.Map('map', { tileSize: 512 });
        map.centerAndZoom(new T.LngLat(102.607, 30.652), 7);
        const layer1 = 'WMS_DOM:ya'
        const layer2 = 'WMS_DOM:ya_e-4'
        const layer3 = 'WMS_DOM:ya_yc_e-5'

        var wmsLayer = new T.TileLayer.WMS(
            'http://127.0.0.1:8080/geoserver/wms',
            {
                layers: layer1,
                format: 'image/png',
                transparent: true,
                version: '1.1.1',
                srs: 'EPSG:4326',
                styles: '',
                exceptions: 'application/vnd.ogc.se_inimage'
            },
            {
                opacity: 0.7,
                minZoom: 0,
                maxZoom: 18
            }
        );
        // 添加WMS图层
        map.addLayer(wmsLayer);


    </script>
</body>

</html>
