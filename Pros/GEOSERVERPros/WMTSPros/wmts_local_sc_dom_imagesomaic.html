<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>天地图加载GeoServer WMS</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        var map = new T.Map('map', { tileSize: 512 });
        map.centerAndZoom(new T.LngLat(102.607, 30.652),7);
        var imageURL =
            'http://localhost:8080/geoserver/gwc/service/wmts?' +
            'Request=GetTile' + 
            '&Service=WMTS' + 
            '&Version=1.0.0' + 
            '&LAYER=WMS_DOM%3Asc_4326_imagesomaic' + 
            '&STYLE=' + 
            '&Format=image%2Fpng' + 
            '&TILEMATRIXSET=EPSG%3A900913' + 
            '&TILEMATRIX=EPSG%3A900913%3A{z}' + 
            '&TILEROW={y}' + 
            '&TILECOL={x}'

        // const southWest = new T.LngLat(10836673.357492, 3005052.861875);
        // const northEast = new T.LngLat(12082903.587845, 4071209.835320);
        const southWest = new T.LngLat(97.3474930604565, 26.0482073950552);
        const northEast = new T.LngLat(108.542569695036, 34.3152387053021);
        const f_bounds = new T.LngLatBounds(southWest, northEast);
        var lay = new T.TileLayer(imageURL, { minZoom: 1, maxZoom: 18, bounds: f_bounds });
        lay.setZIndex(1000)
        map.addLayer(lay);


    </script>
</body>

</html>
