<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>天地图加载GeoServer WMS</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        var map = new T.Map('map', { tileSize: 512 });
        map.centerAndZoom(new T.LngLat(102.607, 30.652), 12);

        const wmtsURL = "http://218.6.196.135:9080/geoserver/WMTS_DOM/gwc/service/wmts" + "?" +
            "SERVICE=WMTS&" +
            "REQUEST=GetTile&" +
            "VERSION=1.0.0&" +
            "LAYER=WMTS_DOM:DOM_YA&" +
            "STYLE=&" +
            "TILEMATRIXSET=EPSG:900913&" +
            "TILEMATRIX=EPSG:900913:{z}&" +
            "TILEROW={y}&" +
            "TILECOL={x}&" +
            "FORMAT=image/png"


        const southWest = new T.LngLat(102.89800198, 29.885822222);
        const northEast = new T.LngLat(103.39800198, 30.385822222);
        const f_bounds = new T.LngLatBounds(southWest, northEast);
        var lay = new T.TileLayer(wmtsURL, { minZoom: 1, maxZoom: 18, bounds: f_bounds });
        console.log(lay)
        lay.setZIndex(1000)
        map.addLayer(lay);


    </script>
</body>

</html>
