    <script>
        // ==================== 工具函数 ====================
        // 根据坐标计算瓦片行列号
        function lngLatToTile(lng, lat, zoom) {
            const x = (lng + 180) / 360;
            const y = (1 - Math.log(Math.tan((lat * Math.PI) / 180) + 1 / Math.cos((lat * Math.PI) / 180)) / Math.PI) / 2;
            const tileCount = Math.pow(2, zoom);
            const tileCol = Math.floor(x * tileCount);
            const tileRow = Math.floor(y * tileCount);
            return [tileCol, tileRow];
        }

        // 根据瓦片行列号计算坐标
        function tileToLngLat(tileCol, tileRow, zoom) {
            const n = Math.pow(2, zoom);
            const lng = (tileCol / n) * 360 - 180;
            const latRad = Math.atan(Math.sinh(Math.PI * (1 - (2 * tileRow) / n)));
            const lat = (latRad * 180) / Math.PI;
            return [lng, lat];
        }

        // 获取天地图影像切片(img)
        function getTileWMTSUrlIMG(tileCol, tileRow, zoom) {
            const serviceNum = Math.floor(Math.random() * 8);
            const baseUrl = `https://t${serviceNum}.tianditu.gov.cn/img_w/wmts?`;
            return baseUrl + 'REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=image%2Fpng' +
                '&tk=be50c7492442ecf4e61ca7bd578d6b8b&TILECOL=' + tileCol + '&TILEROW=' + tileRow + '&TILEMATRIX=' + zoom;
        }

        // 获取天地图影像注记(cia)
        function getTileWMTSUrlCIA(tileCol, tileRow, zoom) {
            const serviceNum = Math.floor(Math.random() * 8);
            const baseUrl = `https://t${serviceNum}.tianditu.gov.cn/cia_w/wmts?`;
            return baseUrl + 'REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=image%2Fpng' +
                '&tk=be50c7492442ecf4e61ca7bd578d6b8b&TILECOL=' + tileCol + '&TILEROW=' + tileRow + '&TILEMATRIX=' + zoom;
        }

        // 获取天地图矢量注记(cva)
        function getTileWMTSUrlCVA(tileCol, tileRow, zoom) {
            const serviceNum = Math.floor(Math.random() * 8);
            const baseUrl = `https://t${serviceNum}.tianditu.gov.cn/cva_w/wmts?`;
            return baseUrl + 'REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=image%2Fpng' +
                '&tk=be50c7492442ecf4e61ca7bd578d6b8b&TILECOL=' + tileCol + '&TILEROW=' + tileRow + '&TILEMATRIX=' + zoom;
        }

        // 获取天地图矢量底图(vec)
        function getTileWMTSUrlVEC(tileCol, tileRow, zoom) {
            const serviceNum = Math.floor(Math.random() * 8);
            const baseUrl = `https://t${serviceNum}.tianditu.gov.cn/vec_w/wmts?`;
            return baseUrl + 'REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=image%2Fpng' +
                '&tk=be50c7492442ecf4e61ca7bd578d6b8b&TILECOL=' + tileCol + '&TILEROW=' + tileRow + '&TILEMATRIX=' + zoom;
        }

        // 计算瓦片边界
        function calculateBounds(tiles) {
            const cols = tiles.map(t => t.col);
            const rows = tiles.map(t => t.row);
            return {
                minCol: Math.min(...cols),
                maxCol: Math.max(...cols),
                minRow: Math.min(...rows),
                maxRow: Math.max(...rows)
            };
        }

        // 加载图片
        function loadImage(url, timeout = 5000000) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                const timer = setTimeout(() => reject(new Error(`图片加载超时: ${url}`)), timeout);
                img.onload = () => {
                    clearTimeout(timer);
                    resolve(img);
                };
                img.onerror = error => {
                    clearTimeout(timer);
                    reject(error);
                };
                img.src = url;
            });
        }

        // 批量加载图片
        async function getAllImages(tiles) {
            const loadPromises = tiles.map(tile =>
                loadImage(tile.url).catch(error => {
                    console.error(`加载瓦片失败: ${tile.url}`, error);
                    return null;
                })
            );
            return await Promise.all(loadPromises);
        }

        // ==================== Three.js场景创建 ====================
        function createScene(domID, camera) {
            const ambientLight = new THREE.AmbientLight(0x404040);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            const container = domID;
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container[0].clientWidth, container[0].clientHeight);
            container[0].appendChild(renderer.domElement);
            scene.add(ambientLight);
            scene.add(directionalLight);
            const control = new THREE.OrbitControls(camera, renderer.domElement);
            control.enablePan = true;
            control.panSpeed = 1.0;
            control.keyPanSpeed = 20.0;

            return [scene, control, renderer];
        }

        // ==================== 获取绘制框边界 ====================
        function getBbox() {
            return new Promise((resolve, reject) => {
                const handler = e => {
                    const bbox = e.currentBounds;
                    recTool.removeEventListener('draw', handler);
                    resolve(bbox);
                };
                recTool.addEventListener('draw', handler);
            });
        }

        // ==================== 获取DEM数据URL ====================
        async function setDEMUrl(layerName, bbox) {
            const resolution = 0.00027777778;
            const minX = bbox.getSouthWest().lng;
            const minY = bbox.getSouthWest().lat;
            const maxX = bbox.getNorthEast().lng;
            const maxY = bbox.getNorthEast().lat;

            let wcsURL = 'http://localhost:8080/geoserver/wcs?service=WCS&version=2.0.1&request=GetCoverage&coverageId=' +
                layerName + '&format=image/tiff&subset=Long(' + minX + ',' + maxX + ')&subset=Lat(' + minY + ',' + maxY + ')';

            const demData = await fetch(wcsURL);
            const arrayBuffer = await demData.arrayBuffer();
            const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
            const image = await tiff.getImage();
            const dem_range = image.getBoundingBox();

            let [dem_minX, dem_minY, dem_maxX, dem_maxY] = dem_range;
            if (minX < dem_minX) dem_minX = dem_minX - resolution;
            if (minY < dem_minY) dem_minY = dem_minY - resolution;
            if (maxX > dem_maxX) dem_maxX = dem_maxX + resolution;
            if (maxY > dem_maxY) dem_maxY = dem_maxY + resolution;

            wcsURL = 'http://localhost:8080/geoserver/wcs?service=WCS&version=2.0.1&request=GetCoverage&coverageId=' +
                layerName + '&format=image/tiff&subset=Long(' + dem_minX + ',' + dem_maxX + ')&subset=Lat(' + dem_minY + ',' + dem_maxY + ')';

            return [wcsURL, [dem_minX, dem_minY, dem_maxX, dem_maxY]];
        }

        // ==================== 创建DEM网格 ====================
        async function c_mesh_dem(demData, camera, m_meshname) {
            const tiff = await GeoTIFF.fromArrayBuffer(demData);
            const image = await tiff.getImage();
            const rasters = await image.readRasters();
            const width = image.getWidth();
            const height = image.getHeight();
            const elevationData = new Float32Array(rasters[0]);
            
            const geometry = new THREE.PlaneGeometry(5, 5 * height / width, width - 1, height - 1);
            
            let maxElevation = -Infinity;
            let minElevation = Infinity;
            for (let i = 0; i < elevationData.length; i++) {
                if (elevationData[i] > maxElevation) maxElevation = elevationData[i];
                if (elevationData[i] !== 0 && elevationData[i] < minElevation) minElevation = elevationData[i];
            }
            
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < elevationData.length; i++) {
                if (maxElevation == minElevation) {
                    positions[i * 3 + 2] = 0;
                } else {
                    // 直接使用归一化高度 [0, 1]
                    positions[i * 3 + 2] = (elevationData[i] - minElevation) / (maxElevation - minElevation);
                }
            }

            geometry.attributes.position.needsUpdate = true;
            geometry.computeVertexNormals();

            const mesh_dem = new THREE.Mesh(geometry);
            mesh_dem.name = m_meshname;
            mesh_dem.rotation.x = -Math.PI / 2;
            camera.position.set(0, 5, 3.5);
            return [mesh_dem, minElevation, maxElevation, geometry];
        }

        // ==================== 获取影像+注记图层 ====================
        async function c_dom_img_cia_lv(bbox, lv) {
            const zoom = lv;
            const tileSize = 256;
            const minX = bbox.getSouthWest().lng;
            const minY = bbox.getSouthWest().lat;
            const maxX = bbox.getNorthEast().lng;
            const maxY = bbox.getNorthEast().lat;

            const nw = lngLatToTile(minX, maxY, zoom);
            const ne = lngLatToTile(maxX, maxY, zoom);
            const sw = lngLatToTile(minX, minY, zoom);
            const se = lngLatToTile(maxX, minY, zoom);

            const minCol = Math.min(nw[0], sw[0]);
            const maxCol = Math.max(ne[0], se[0]);
            const minRow = Math.min(ne[1], se[1]);
            const maxRow = Math.max(nw[1], sw[1]);

            const tiles = [];
            const tiles2 = [];
            for (let col = minCol; col <= maxCol; col++) {
                for (let row = minRow; row <= maxRow; row++) {
                    tiles.push({ url: getTileWMTSUrlIMG(col, row, zoom), col: col, row: row });
                    tiles2.push({ url: getTileWMTSUrlCIA(col, row, zoom), col: col, row: row });
                }
            }

            const bounds = calculateBounds(tiles);
            const canvasWidth = (bounds.maxCol - bounds.minCol + 1) * tileSize;
            const canvasHeight = (bounds.maxRow - bounds.minRow + 1) * tileSize;

            const canvas1 = document.createElement('canvas');
            const ctx1 = canvas1.getContext('2d', { willReadFrequently: true });
            canvas1.width = canvasWidth;
            canvas1.height = canvasHeight;
            ctx1.fillStyle = 'transparent';
            ctx1.fillRect(0, 0, canvasWidth, canvasHeight);

            const [firstTile_nw_x, firstTile_nw_y] = tileToLngLat(minCol, minRow, zoom);
            const [lastTile_se_x, lastTile_se_y] = tileToLngLat(maxCol + 1, maxRow + 1, zoom);
            const geo_width = lastTile_se_x - firstTile_nw_x;
            const geo_height = lastTile_se_y - firstTile_nw_y;
            const pixelsPerDegreeX = canvasWidth / geo_width;
            const pixelsPerDegreeY = canvasHeight / geo_height;
            const selectionPixelWidth = (maxX - minX) * pixelsPerDegreeX;
            const selectionPixelHeight = (minY - maxY) * pixelsPerDegreeY;

            const canvas2 = document.createElement('canvas');
            canvas2.width = Math.ceil(selectionPixelWidth);
            canvas2.height = Math.ceil(selectionPixelHeight);
            const ctx2 = canvas2.getContext('2d');

            const offset_x = (minX - firstTile_nw_x) * pixelsPerDegreeX;
            const offset_y = (maxY - firstTile_nw_y) * pixelsPerDegreeY;

            return new Promise(async (resolve, reject) => {
                try {
                    const images = await getAllImages(tiles);
                    images.forEach((img, index) => {
                        const tile = tiles[index];
                        const x = (tile.col - bounds.minCol) * tileSize;
                        const y = (tile.row - bounds.minRow) * tileSize;
                        ctx1.drawImage(img, x, y, tileSize, tileSize);
                    });
                    const cias = await getAllImages(tiles2);
                    cias.forEach((cia, index) => {
                        const tile = tiles2[index];
                        const x = (tile.col - bounds.minCol) * tileSize;
                        const y = (tile.row - bounds.minRow) * tileSize;
                        ctx1.drawImage(cia, x, y, tileSize, tileSize);
                    });
                    const imageData = ctx1.getImageData(Math.floor(offset_x), Math.floor(offset_y), canvas2.width, canvas2.height);
                    ctx2.putImageData(imageData, 0, 0);
                    resolve(canvas2);
                } catch (error) {
                    reject(error);
                }
            });
        }

        // ==================== 获取矢量+注记图层 ====================
        async function c_dom_vec_cva_lv(bbox, lv) {
            const zoom = lv;
            const tileSize = 256;
            const minX = bbox.getSouthWest().lng;
            const minY = bbox.getSouthWest().lat;
            const maxX = bbox.getNorthEast().lng;
            const maxY = bbox.getNorthEast().lat;

            const nw = lngLatToTile(minX, maxY, zoom);
            const ne = lngLatToTile(maxX, maxY, zoom);
            const sw = lngLatToTile(minX, minY, zoom);
            const se = lngLatToTile(maxX, minY, zoom);

            const minCol = Math.min(nw[0], sw[0]);
            const maxCol = Math.max(ne[0], se[0]);
            const minRow = Math.min(ne[1], se[1]);
            const maxRow = Math.max(nw[1], sw[1]);

            const tiles = [];
            const tiles2 = [];
            for (let col = minCol; col <= maxCol; col++) {
                for (let row = minRow; row <= maxRow; row++) {
                    tiles.push({ url: getTileWMTSUrlVEC(col, row, zoom), col: col, row: row });
                    tiles2.push({ url: getTileWMTSUrlCVA(col, row, zoom), col: col, row: row });
                }
            }

            const bounds = calculateBounds(tiles);
            const canvasWidth = (bounds.maxCol - bounds.minCol + 1) * tileSize;
            const canvasHeight = (bounds.maxRow - bounds.minRow + 1) * tileSize;

            const canvas1 = document.createElement('canvas');
            const ctx1 = canvas1.getContext('2d', { willReadFrequently: true });
            canvas1.width = canvasWidth;
            canvas1.height = canvasHeight;
            ctx1.fillStyle = 'transparent';
            ctx1.fillRect(0, 0, canvasWidth, canvasHeight);

            const [firstTile_nw_x, firstTile_nw_y] = tileToLngLat(minCol, minRow, zoom);

            const geo_height = lastTile_se_y - firstTile_nw_y;
            const pixelsPerDegreeX = canvasWidth / geo_width;
            const pixelsPerDegreeY = canvasHeight / geo_height;
            const selectionPixelWidth = (maxX - minX) * pixelsPerDegreeX;
            const selectionPixelHeight = (minY - maxY) * pixelsPerDegreeY;

            const canvas2 = document.createElement('canvas');
            canvas2.width = Math.ceil(selectionPixelWidth);
            canvas2.height = Math.ceil(selectionPixelHeight);

            const offset_y = (maxY - firstTile_nw_y) * pixelsPerDegreeY;

            return new Promise(async (resolve, reject) => {
                try {
                    const images = await getAllImages(tiles);
                    images.forEach((img, index) => {
                        const tile = tiles[index];
                        const x = (tile.col - bounds.minCol) * tileSize;
                        const y = (tile.row - bounds.minRow) * tileSize;

                    const cias = await getAllImages(tiles2);

                        const y = (tile.row - bounds.minRow) * tileSize;
                        ctx1.drawImage(cia, x, y, tileSize, tileSize);
                    });
                    const imageData = ctx1.getImageData(Math.floor(offset_x), Math.floor(offset_y), canvas2.width, canvas2.height);
                    ctx2.putImageData(imageData, 0, 0);
                    resolve(canvas2);
                } catch (error) {
                    reject(error);
                }
            });
        }

            // 创建模拟用的高分辨率高度纹理（通过GPU上采样）

            // GPGPU 场景和相机

            // 创建shader材质展示DOM影像和污染效果
            const terrainMat = new THREE.ShaderMaterial({

                    uHasTerrainTex: { value: 1.0 },

                    uLightDir: { value: new THREE.Vector3(0.5, 0.8, 0.5) },

                    uDiffuse: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D uTerrainTex;
                    uniform sampler2D uPollutionTex;
                    uniform sampler2D uWaterTex;
                    uniform float uHasTerrainTex;
                    uniform vec3 uTerrainColor;
                    uniform vec3 uPollutionColor;
                    uniform vec3 uLightDir;
                    uniform float uAmbient;
                    uniform float uDiffuse;
                    
                    varying vec3 vNormal;
                    varying vec2 vUv;
                    
                    void main() {
                        // 翻转UV的Y坐标以匹配纹理方向
                        vec2 flippedUV = vec2(vUv.x, 1.0 - vUv.y);
                        
                        // 获取基础地形颜色
                        vec3 baseColor = uTerrainColor;
                        if (uHasTerrainTex > 0.5) {
                            baseColor = texture2D(uTerrainTex, flippedUV).rgb;
                        }
                        
                        // 读取污染强度
                        float pollutionAmount = texture2D(uPollutionTex, flippedUV).r;
                        float pollutionStrength = smoothstep(0.002, 0.15, pollutionAmount);
                        
                        // 混合基础颜色和污染颜色
                        vec3 finalColor = mix(baseColor, uPollutionColor, pollutionStrength * 0.7);
                        
                        // 简单光照计算
                        vec3 lightDir = normalize(uLightDir);
                        float diff = max(dot(vNormal, lightDir), 0.0);
                        vec3 color = finalColor * (uAmbient + uDiffuse * diff);
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });
            
            mesh_dem.material = terrainMat;
            // 初始化地形材质的污染纹理和水深纹理

            terrainMat.uniforms.uWaterTex.value = rtWater[0].texture;

            // ==================== 创建计算材质 ====================

            const fluxShader = createFluxShader();
            const fluxUniforms = {

            const waterUniforms = {

                uFluxTex: { value: null },
                uHeightTex: { value: simHeightTexture },
                uResolution: { value: new THREE.Vector2(simWidth, simHeight) },
                uDt: { value: params.dt },

            // 否则会导致纹理采样错位

            console.log(`地形尺寸: ${tiffWidth}x${tiffHeight}, 模拟分辨率: ${simWidth}x${simHeight}, 水面网格分段: ${waterSegmentsX}x${waterSegmentsY}`);

            const waterGeo = new THREE.PlaneGeometry(

            );
            const waterRenderMat = createWaterRenderMaterial();
            waterRenderMat.uniforms.uHeightTex.value = heightTexture;
            // uHeightScale不再使用，但保留uniform定义以免报错
            waterRenderMat.uniforms.uHeightScale.value = 1.0;
            waterRenderMat.uniforms.uMaxDepth.value = 0.05; // 最大水深阈值，用于颜色过渡
            waterRenderMat.uniforms.uResolution.value.set(simWidth, simHeight);
            waterRenderMat.uniforms.uTerrainSize.value = TERRAIN_SIZE;
            waterRenderMat.uniforms.uLightDir.value.set(0.5, 0.8, 0.5).normalize();
            waterRenderMat.uniforms.uSpecularColor.value.setHex(0xffffff);
            waterRenderMat.uniforms.uShininess.value = 100.0;
            
            const waterSurface = new THREE.Mesh(waterGeo, waterRenderMat);
            waterSurface.rotation.x = -Math.PI / 2;
            waterSurface.position.y = 0.001;
            scene1.add(waterSurface);
            
            // ==================== 射线检测和点击交互 ====================
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let isInjecting = false;
            let injectUV = new THREE.Vector2();
            
            function onMouseDown(event) {
                const rect = renderer1.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera1);
                const intersects = raycaster.intersectObject(mesh_dem);
                
                if (intersects.length > 0) {
                    // 重置所有流体和污染纹理
                    resetSimulation();
                    
                    const uv = intersects[0].uv;
                    // 翻转 V 坐标以匹配模拟纹理方向
                    injectUV.set(uv.x, 1.0 - uv.y);
                    
                    // 获取点击位置的归一化高度（使用模拟分辨率）
                    const ix = Math.floor(uv.x * simWidth);
                    const iy = Math.floor((1.0 - uv.y) * simHeight);
                    const heightValue = simHeightData[(iy * simWidth + ix) * 4];
                    
                    
                    // 在相交点创建一个白色小球标记 - 已取消
                    // const point = intersects[0].point;
                    // const sphereGeometry = new THREE.SphereGeometry(0.05, 16, 16);
                    // const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    // const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                    // sphere.position.copy(point);
                    // sphere.position.y += 0.02; // 稍微抬高避免z-fighting
                    // sphere.name = 'clickMarker';
                    
                    // 移除旧的标记 - 已取消
                    // const oldMarker = scene1.getObjectByName('clickMarker');
                    // if (oldMarker) {
                    //     scene1.remove(oldMarker);
                    //     oldMarker.geometry.dispose();
                    //     oldMarker.material.dispose();
                    // }
                    // scene1.add(sphere);
                    
                    // 计算地形梯度方向
                    const slopeDir = calculateSlopeDirection(uv.x, 1.0 - uv.y);
                    waterUniforms.uSlopeDir.value.copy(slopeDir);
                    
                    isInjecting = true;
                    waterUniforms.uInjectActive.value = true;
                    waterUniforms.uInjectPos.value.copy(injectUV);
                }
            }
            
            function onMouseUp() {
                isInjecting = false;
                waterUniforms.uInjectActive.value = false;
            }
            
            function onMouseMove(event) {
                if (!isInjecting) return;
                
                const rect = renderer1.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera1);
                const intersects = raycaster.intersectObject(mesh_dem);
                
                if (intersects.length > 0) {
                    const uv = intersects[0].uv;
                    injectUV.set(uv.x, 1.0 - uv.y);
                    waterUniforms.uInjectPos.value.copy(injectUV);
                    
                    const slopeDir = calculateSlopeDirection(uv.x, 1.0 - uv.y);
                    waterUniforms.uSlopeDir.value.copy(slopeDir);
                    
                    // 更新白色小球的位置 - 已取消
                    // const marker = scene1.getObjectByName('clickMarker');
                    // if (marker) {
                    //     marker.position.copy(intersects[0].point);
                    //     marker.position.y += 0.02;
                    // }
                }
            }
            
            // 计算地形梯度方向
            function calculateSlopeDirection(u, v) {
                const texelX = 1 / simWidth;
                const texelY = 1 / simHeight;
                
                const ix = Math.floor(u * simWidth);
                const iy = Math.floor(v * simHeight);
                
                const getHeight = (x, y) => {
                    x = Math.max(0, Math.min(simWidth - 1, x));
                    y = Math.max(0, Math.min(simHeight - 1, y));
                    return simHeightData[(y * simWidth + x) * 4];
                };
                
                const hC = getHeight(ix, iy);
                const hR = getHeight(ix + 1, iy);
                const hL = getHeight(ix - 1, iy);
                const hT = getHeight(ix, iy + 1);
                const hB = getHeight(ix, iy - 1);
                
                const gradX = -(hR - hL) * texelX;
                const gradY = -(hT - hB) * texelY;
                
                const len = Math.sqrt(gradX * gradX + gradY * gradY);
                if (len > 1e-6) {
                    return new THREE.Vector2(gradX / len, gradY / len);
                }
                return new THREE.Vector2(0, 0);
            }
            
            renderer1.domElement.addEventListener('mousedown', onMouseDown);
            renderer1.domElement.addEventListener('mouseup', onMouseUp);
            renderer1.domElement.addEventListener('mousemove', onMouseMove);
            renderer1.domElement.addEventListener('mouseleave', onMouseUp);
            
            function resetSimulation() {
                const clearColor = new THREE.Color(0, 0, 0);
                renderer1.setClearColor(clearColor, 0);
                
                renderer1.setRenderTarget(rtWater[0]);
                renderer1.clear();
                renderer1.setRenderTarget(rtWater[1]);
                renderer1.clear();
                
                renderer1.setRenderTarget(rtFlux[0]);
                renderer1.clear();
                renderer1.setRenderTarget(rtFlux[1]);
                renderer1.clear();
                
                renderer1.setRenderTarget(rtPollution[0]);
                renderer1.clear();
                renderer1.setRenderTarget(rtPollution[1]);
                renderer1.clear();
                
                renderer1.setRenderTarget(null);
            }
            
            // ==================== 模拟步进函数 ====================
            function simulationStep() {
                const curr = currentBuffer;
                const next = 1 - curr;
                
                gpgpuScene.clear();
                
                // 步顤1: 计算通量
                gpgpuScene.add(fluxMesh);
                fluxUniforms.uWaterTex.value = rtWater[curr].texture;
                fluxUniforms.uFluxTex.value = rtFlux[curr].texture;
                renderer1.setRenderTarget(rtFlux[next]);
                renderer1.render(gpgpuScene, gpgpuCamera);
                
                // 步顤2: 更新水深
                gpgpuScene.clear();
                gpgpuScene.add(waterMesh);
                waterUniforms.uWaterTex.value = rtWater[curr].texture;
                waterUniforms.uFluxTex.value = rtFlux[next].texture;
                renderer1.setRenderTarget(rtWater[next]);
                renderer1.render(gpgpuScene, gpgpuCamera);
                
                // 步顤3: 更新污染标记
                gpgpuScene.clear();
                gpgpuScene.add(pollutionMesh);
                pollutionUniforms.uPollutionTex.value = rtPollution[curr].texture;
                pollutionUniforms.uWaterTex.value = rtWater[next].texture;
                renderer1.setRenderTarget(rtPollution[next]);
                renderer1.render(gpgpuScene, gpgpuCamera);
                
                // 步顤4: 交换缓冲
                currentBuffer = next;
                
                // 更新渲染材质
                waterRenderMat.uniforms.uWaterTex.value = rtWater[currentBuffer].texture;
                terrainMat.uniforms.uPollutionTex.value = rtPollution[currentBuffer].texture;
                terrainMat.uniforms.uWaterTex.value = rtWater[currentBuffer].texture;
            }
            
            // 显示3D窗口
            await new Promise((resolve, reject) => {
                layer.close(loadIndex);
                $('#Window_3D').css('visibility', 'visible');
                
                // 窗口显示后初始化interact拖动缩放功能
                init3DViewDragResize('Window_3D');
                console.log('interact 初始化完成');
                
                resolve();
            });

            // 渲染循环
            function animate() {
                requestAnimationFrame(animate);
                
                // 执行多次模拟步进以提高稳定性
                const subSteps = 5;
                for (let i = 0; i < subSteps; i++) {
                    simulationStep();
                }
                
                control1.update();
                
                // 重置渲染目标并渲染主场景
                renderer1.setRenderTarget(null);
                renderer1.render(scene1, camera1);
            }
            animate();
        }
        
        // ==================== 窗口控制按钮 ====================
        $('#clo_con1').on('click', function () {
            $('#Window_3D').css('visibility', 'hidden');
            recTool.clear();
        });
        
        $('#reloadScene1').on('click', function () {
            camera1.position.set(0, 5, 3.5);
        });
        
        // ==================== interact组件拖动缩放功能 ====================
        function init3DViewDragResize(elementId) {
            console.log('开始初始化 interact:', elementId);
            
            const element = document.getElementById(elementId);
            if (!element) {
                console.error('元素不存在:', elementId);
                return;
            }
            
            // 清理之前的interact实例
            interact(element).unset();
            
            interact(element)
                .draggable({
                    // 只在v_header区域可以拖动
                    allowFrom: '.v_header',
                    listeners: {
                        start(event) {
                            console.log('开始拖动');
                        },
                        move(event) {
                            const target = event.target;
                            const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                            const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                            
                            target.style.transform = `translate(${x}px, ${y}px)`;
                            target.setAttribute('data-x', x);
                            target.setAttribute('data-y', y);
                        }
                    },
                    modifiers: [
                        interact.modifiers.restrictRect({
                            restriction: 'parent',
                            endOnly: true
                        })
                    ]
                })
                .resizable({
                    edges: { left: true, right: true, bottom: true, top: true },
                    listeners: {
                        start(event) {
                            console.log('开始缩放');
                        },
                        move(event) {
                            const target = event.target;
                            let x = parseFloat(target.getAttribute('data-x')) || 0;
                            let y = parseFloat(target.getAttribute('data-y')) || 0;
                            
                            // 更新元素尺寸
                            target.style.width = event.rect.width + 'px';
                            target.style.height = event.rect.height + 'px';
                            
                            // 处理从左侧或顶部拉伸时的位置变化
                            x += event.deltaRect.left;
                            y += event.deltaRect.top;
                            
                            target.style.transform = `translate(${x}px, ${y}px)`;
                            target.setAttribute('data-x', x);
                            target.setAttribute('data-y', y);
                            
                            // 同步更新three.js渲染器尺寸
                            const container = target.querySelector('.three_container');
                            if (container) {
                                const newWidth = event.rect.width - 10;
                                const newHeight = event.rect.height - 40;
                                container.style.width = newWidth + 'px';
                                container.style.height = newHeight + 'px';
                                
                                // 更新renderer尺寸
                                if (renderer1) {
                                    renderer1.setSize(newWidth, newHeight);
                                    camera1.aspect = newWidth / newHeight;
                                    camera1.updateProjectionMatrix();
                                }
                            }
                        }
                    },
                    modifiers: [
                        interact.modifiers.restrictSize({
                            min: { width: 400, height: 300 }
                        })
                    ],
                    // 设置缩放的边距（更容易抓取边缘）
                    margin: 10
                });
                
            console.log('interact 配置完成');
        }
    </script>
