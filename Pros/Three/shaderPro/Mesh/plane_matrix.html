<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <script src="/Public/js/f3d.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>
    <script>
        let terrainMesh = null;
        let heightScale = 0.5;
        let smoothness = 3;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(1, 50, 3);

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 添加光源
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        // 添加控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;


        const line_points = [new THREE.Vector3(-10, 0, 0), new THREE.Vector3(10, 10, 10)]
        const line_geometry = new THREE.BufferGeometry().setFromPoints(line_points);
        const line_material = new THREE.LineBasicMaterial({
            color: '#ff0000'
        })
        const line = new THREE.Line(line_geometry, line_material)
        scene.add(line)

        const plane_geometry = new THREE.PlaneGeometry(5, 5)
        const plane_material = new THREE.MeshBasicMaterial({
            color: '#3f7b9d',
            side: THREE.DoubleSide,
        });
        const plane = new THREE.Mesh(plane_geometry, plane_material)
        plane.position.set(0, 0, 0)

        const lineDirection = new THREE.Vector3().subVectors(line_points[1], line_points[0]).normalize();
        plane.lookAt(plane.position.clone().add(lineDirection));
        plane.rotateX(Math.PI / 2)

        scene.add(plane)

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();


    </script>
</body>

</html>
