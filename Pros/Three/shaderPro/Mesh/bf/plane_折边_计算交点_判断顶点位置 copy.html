<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <script src="/Public/js/f3d.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>
    <script>
        let terrainMesh = null;
        let heightScale = 0.5;
        let smoothness = 3;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(1, 10, 3);

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 添加光源
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        // 添加控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        //-------------------------------------

        const plane_geometry = new THREE.PlaneGeometry(5, 5)
        const plane_material = new THREE.MeshBasicMaterial({
            color: '#3f7b9d',
            side: THREE.DoubleSide,
        });
        const plane1 = new THREE.Mesh(plane_geometry, plane_material)
        plane1.rotateX(-Math.PI / 2)
        scene.add(plane1)

        const geometry = new THREE.CircleGeometry(2.0, 8);
        const material = new THREE.MeshBasicMaterial({
            color: 0x00ff00,
            wireframe: true
        });
        const circle = new THREE.Mesh(geometry, material);
        circle.rotateX(-Math.PI / 2)
        circle.updateWorldMatrix(true, false);
        scene.add(circle)

        const line_points = [new THREE.Vector3(1.3, 0, -1.8), new THREE.Vector3(0.2, 0, 2.2)]
        const line_geometry = new THREE.BufferGeometry().setFromPoints(line_points);
        const line_material = new THREE.LineBasicMaterial({
            color: '#ff0000'
        })
        const line = new THREE.Line(line_geometry, line_material)
        scene.add(line)

        // 创建顶点标记
        const positionAttribute = circle.geometry.attributes.position;
        console.log(positionAttribute)
        const vector = new THREE.Vector3();
        const verticesOnRight = [];

        // 正确的判断函数
        function isPointOnRight(lineStart, lineEnd, point) {
            // 线的方向向量
            const lineVec = new THREE.Vector3().subVectors(lineEnd, lineStart);
            // 从线起点到顶点的向量
            const pointVec = new THREE.Vector3().subVectors(point, lineStart);

            // 在XZ平面上的叉积 (只关心Y分量)
            const crossY = lineVec.x * pointVec.z - lineVec.z * pointVec.x;

            // 在Three.js的右手坐标系中，如果crossY < 0，点在右侧
            return crossY < 0;
        }

        for (let i = 0; i < positionAttribute.count; i++) {
            vector.fromBufferAttribute(positionAttribute, i)
            circle.localToWorld(vector)

            // 判断顶点是否在线的右侧
            const isRight = isPointOnRight(line_points[0], line_points[1], vector);

            if (isRight) {
                verticesOnRight.push({
                    position: vector.clone(),
                    index: i
                });
                // 标记右侧顶点（用蓝色标记）
                const markerGeometry = new THREE.SphereGeometry(0.05, 8, 8);
                const markerMaterial = new THREE.MeshBasicMaterial({ color: '#0000ff' }); // 蓝色表示右侧
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.copy(vector);
                scene.add(marker);
                console.log(`顶点 ${i} 在右侧`);
            } else {
                // 标记左侧顶点（用黄色标记）
                const markerGeometry = new THREE.SphereGeometry(0.05, 8, 8);
                const markerMaterial = new THREE.MeshBasicMaterial({ color: '#ffff00' }); // 黄色表示左侧
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.copy(vector);
                scene.add(marker);
                console.log(`顶点 ${i} 在左侧`);
            }
        }

        console.log(`有 ${verticesOnRight.length} 个顶点在线的右侧`);


        //-------------------------------------


        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();


    </script>
</body>

</html>
