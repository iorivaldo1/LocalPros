<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(1, 50, 3);

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 添加光源
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 添加控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const geometry = new THREE.CircleGeometry(4, 32);

        const vs1 = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const fs1 = `
            varying vec2 vUv;
            void main() {
                // float dis_x = vUv.x;
                gl_FragColor = vec4(0.2,0.0,0.0, 1.0);
            }
        `;
        const shaderMaterial = new THREE.ShaderMaterial({
            vertexShader: vs1,
            fragmentShader: fs1,
            side: THREE.DoubleSide,
            uniforms: {
                time: { value: 0.0 }
            },
            transparent: true,
        });
        const mesh1 = new THREE.Mesh(geometry, shaderMaterial);
        console.log(mesh1.normalMatrix.elements);
        const mesh2 =  new THREE.Mesh(geometry, shaderMaterial);
        mesh2.rotateX(-Math.PI / 2);
        console.log(mesh2.normalMatrix.elements);

        scene.add(mesh1)
        scene.add(mesh2)

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();


    </script>
</body>

</html>
