<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Public/js/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
    </style>
    
    <script id="vertexShader" type="x-shader/x-vertex">
        void main() {
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    
    <script id="fragShader" type="x-shader/x-fragment">
        uniform vec2 res;
        uniform sampler2D bufferTexture;
        uniform vec3 smokeSource;
        uniform float time;
        
        void main() {
            vec2 pixel = gl_FragCoord.xy / res.xy;
            float dist = distance(smokeSource.xy, gl_FragCoord.xy);
            gl_FragColor = texture2D(bufferTexture, pixel);

            gl_FragColor.rgb += smokeSource.z * max(15.0 - dist, 0.0);

            vec2 smokePoint = vec2(res.x/2.0 + 100.0*sin(time), res.y/2.0 + cos(time*3.5)*20.0);
            dist = distance(smokePoint, gl_FragCoord.xy);
            gl_FragColor.rgb += 0.01 * max(15.0 - dist, 0.0);

            float xPixel = 1.0/res.x;
            float yPixel = 1.0/res.y;
            vec4 rightColor = texture2D(bufferTexture, vec2(pixel.x + xPixel, pixel.y));
            vec4 leftColor = texture2D(bufferTexture, vec2(pixel.x - xPixel, pixel.y));
            vec4 upColor = texture2D(bufferTexture, vec2(pixel.x, pixel.y + yPixel));
            vec4 downColor = texture2D(bufferTexture, vec2(pixel.x, pixel.y - yPixel));
            
            if(pixel.y <= yPixel) {
                downColor.rgb = vec3(0.0);
            }
            
            float factor = 8.0 * 0.016 * (leftColor.r + rightColor.r + downColor.r * 3.0 + upColor.r - 6.0 * gl_FragColor.r);
            float minimum = 0.003;
            if(factor >= -minimum && factor < 0.0) factor = -minimum;
            gl_FragColor.rgb += factor;
        }
    </script>
</head>

<body>
    <script>
        var scene;
        var camera;
        var renderer;

        function scene_setup() {
            scene = new THREE.Scene();
            var width = window.innerWidth;
            var height = window.innerHeight;
            camera = new THREE.OrthographicCamera(width / -2, width / 2, height / 2, height / -2, -1, 1000);
            camera.position.z = 1;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 1);
            renderer.autoClear = false;
            document.body.appendChild(renderer.domElement);
        }

        var bufferScene;
        var textureA;
        var textureB;
        var bufferMaterial;
        var plane;
        var bufferObject;
        var finalMaterial;
        var quad;

        function buffer_texture_setup() {
            bufferScene = new THREE.Scene();
            textureA = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
                minFilter: THREE.LinearFilter,
                magFilter: THREE.NearestFilter,
                format: THREE.RGBAFormat,
                type: THREE.UnsignedByteType,
                depthBuffer: false
            });
            textureB = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
                minFilter: THREE.LinearFilter,
                magFilter: THREE.NearestFilter,
                format: THREE.RGBAFormat,
                type: THREE.UnsignedByteType,
                depthBuffer: false
            });

            // 初始化纹理
            var canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            var texture = new THREE.CanvasTexture(canvas);
            
            bufferMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    bufferTexture: { type: "t", value: texture },
                    res: { type: "v2", value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    smokeSource: { type: "v3", value: new THREE.Vector3(0, 0, 0) },
                    time: { type: "f", value: 0.0 }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragShader').textContent
            });

            plane = new THREE.PlaneGeometry(window.innerWidth, window.innerHeight);
            bufferObject = new THREE.Mesh(plane, bufferMaterial);
            bufferScene.add(bufferObject);

            finalMaterial = new THREE.MeshBasicMaterial({ map: textureB.texture, toneMapped: false });
            quad = new THREE.Mesh(plane, finalMaterial);
            scene.add(quad);
        }

        scene_setup();
        buffer_texture_setup();

        var mouseDown = false;
        function UpdateMousePosition(X, Y) {
            var mouseX = X;
            var mouseY = window.innerHeight - Y;
            bufferMaterial.uniforms.smokeSource.value.x = mouseX;
            bufferMaterial.uniforms.smokeSource.value.y = mouseY;
        }

        document.onmousemove = function(event) {
            UpdateMousePosition(event.clientX, event.clientY);
        }

        document.onmousedown = function(event) {
            mouseDown = true;
            bufferMaterial.uniforms.smokeSource.value.z = 0.1;
        }

        document.onmouseup = function(event) {
            mouseDown = false;
            bufferMaterial.uniforms.smokeSource.value.z = 0;
        }

        function render() {
            requestAnimationFrame(render);

            // 更新时间
            bufferMaterial.uniforms.time.value += 0.01;

            // 渲染到 textureB
            renderer.setRenderTarget(textureB);
            renderer.render(bufferScene, camera);

            // 交换纹理
            var t = textureA;
            textureA = textureB;
            textureB = t;
            
            // 更新材质
            quad.material.map = textureB.texture;
            bufferMaterial.uniforms.bufferTexture.value = textureA.texture;

            // 渲染到屏幕
            renderer.setRenderTarget(null);
            renderer.render(scene, camera);
        }
        render();
    </script>
</body>

</html>
