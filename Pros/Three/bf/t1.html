<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../Public/js/three.min.js"></script>
    <script src="../Public/js/shaders/three_utills.js"></script>
    <script src="../Public/js/OrbitControls.js"></script>
    <script src="../Public/js/jquery-3.7.1.min.js"></script>
    <script src="../Public/js/geotiff.js"></script>
    <style>
        #fileInput {
            position: absolute;
            top: 50px;
            right: 100px;
            background-color: white;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>
    <input type="file" id="fileInput" accept=".tif,.tiff">
    <script>
        let terrainMesh = null;
        let heightScale = 0.5;
        let smoothness = 3;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(1, 2, 3);

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 添加光源
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 添加坐标轴辅助
        const axesHelper = new THREE.AxesHelper();
        scene.add(axesHelper);

        // 添加控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        //读取dem
        function HD1() {
            const file = event.target.files[0]
            loadDEM(file)
        }

        async function loadDEM(file) {
            const arrayBuffer = await file.arrayBuffer();
            const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
            const image = await tiff.getImage();
            const rasters = await image.readRasters();

            const width = image.getWidth();
            const height = image.getHeight();

            let elevationData;
            if (rasters[0] instanceof Float32Array) {
                elevationData = rasters[0];
            } else if (rasters[0] instanceof Int16Array) {
                elevationData = new Float32Array(rasters[0]);
            } else {
                elevationData = new Float32Array(rasters[0]);
            }
            processElevationData(elevationData, width, height);
        }

        // 处理高程数据并创建地形网格
        function processElevationData(data, width, height) {
            if (terrainMesh) {
                scene.remove(terrainMesh);
                terrainMesh.geometry.dispose();
                terrainMesh.material.dispose();
            }
            console.log(width, height)
            // const geometry = new THREE.PlaneGeometry(5, 5, width - 1, height - 1);
            const vertices = new Float32Array(width * height * 3);
            const maxElevation = Math.max(...data);
            const minElevation = Math.min(...data.filter(num => num !== 0))
            const n_data = data.map(num => num === 0 ? minElevation - 1 : num)

            // for (let i = 0, j = 0; i < vertices.length; i += 3, j++) {

            //     if (j < data.length) {
            //         vertices[i + 2] = (n_data[j] - minElevation) / (maxElevation - minElevation) * heightScale * smoothness;
            //     }
            // }

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 3;
                    const dataIndex = y * width + x;

                    // 设置顶点位置
                    vertices[index] = x;  // X坐标
                    vertices[index + 1] = y; // Y坐标 

                    if (dataIndex < data.length) {
                        // 设置高度（Z坐标）
                        vertices[index + 2] = (n_data[dataIndex] - minElevation) / (maxElevation - minElevation) * heightScale * smoothness;
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            const indices = [];
            for (let y = 0; y < height - 1; y++) {
                for (let x = 0; x < width - 1; x++) {
                    const a = y * width + x;
                    const b = y * width + x + 1;
                    const c = (y + 1) * width + x;
                    const d = (y + 1) * width + x + 1;

                    // 创建两个三角形
                    indices.push(a, b, c);
                    indices.push(b, d, c);
                }
            }
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            const colors = [];
            for (let i = 0; i < width * height; i++) {
                const color = new THREE.Color();

                if (i < data.length && n_data[i] == minElevation - 1) {
                    color.setRGB(0, 0, 0); // 无效数据点
                } else if (i < data.length) {
                    const elevation = (n_data[i] - minElevation) / (maxElevation - minElevation);
                    color.setHSL(0.7 * (1 - elevation), 1, 0.5);
                } else {
                    color.setRGB(0.5, 0.5, 0.5); // 默认颜色
                }

                colors.push(color.r, color.g, color.b);
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const customShaderMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    c_r: { value: 0.0 },
                    c_g: { value: 0.0 },
                    c_b: { value: 0.0 },
                    opacity: { value: 1.0 }
                },
                vertexShader: vs1,
                fragmentShader: fs2,
                vertexColors: true,
                transparent: true,
                side: THREE.DoubleSide
            });


            terrainMesh = new THREE.Mesh(geometry, customShaderMaterial);
            terrainMesh.rotation.x = -Math.PI / 2;
            scene.add(terrainMesh);

            camera.position.set(0, maxElevation, 3);
            controls.reset();
        }

        $('#fileInput').on('change', HD1)

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
