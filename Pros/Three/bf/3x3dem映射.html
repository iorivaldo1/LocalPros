<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/three_shaders.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <style>
        #fileInput {
            position: absolute;
            top: 50px;
            right: 100px;
            background-color: white;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>
    <input type="file" id="fileInput" accept=".tif,.tiff">
    <script>
        let terrainMesh = null;
        let heightScale = 0.5;
        let smoothness = 3;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(1, 2, 3);

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 添加光源
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // 添加坐标轴辅助
        const axesHelper = new THREE.AxesHelper();
        scene.add(axesHelper);

        // 添加控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        //读取dem
        function HD1() {
            const file = event.target.files[0]
            loadDEMFromGeoServer(file)
        }

        async function loadDEMFromGeoServer(file) {
            const arrayBuffer = await file.arrayBuffer();
            const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
            const image = await tiff.getImage();
            const rasters = await image.readRasters();

            const width = image.getWidth();
            const height = image.getHeight();

            let elevationData;
            if (rasters[0] instanceof Float32Array) {
                elevationData = rasters[0];
            } else if (rasters[0] instanceof Int16Array) {
                elevationData = new Float32Array(rasters[0]);
            } else {
                elevationData = new Float32Array(rasters[0]);
            }
            processElevationData(elevationData, width, height);
        }

        // 处理高程数据并创建地形网格
        function processElevationData(data, width, height) {
            if (terrainMesh) {
                scene.remove(terrainMesh);
                terrainMesh.geometry.dispose();
                terrainMesh.material.dispose();
            }

            const maxElevation = Math.max(...data);
            const minElevation = Math.min(...data.filter(num => num !== 0))

            const geometry = new THREE.PlaneGeometry(5, 5, width, height);
            const positionAttribute = geometry.getAttribute('position');
            const vertices = positionAttribute.array;
            const vertexCount = vertices.length / 3;
            console.log('DEM 数据点数:', width * height); // 应该是 9
            console.log('几何体顶点数:', vertexCount);    // 应该是 9
            const demMap = [
                // 第0行
                { vertexIndex: 0, demIndex: 0 },  // 左上角
                { vertexIndex: 1, demIndex: 0 },  // 插值
                { vertexIndex: 2, demIndex: 1 },  // 插值  
                { vertexIndex: 3, demIndex: 2 },  // 右上角

                // 第1行
                { vertexIndex: 4, demIndex: 0 },  // 插值
                { vertexIndex: 5, demIndex: 0 },  // 双线性插值
                { vertexIndex: 6, demIndex: 1 },  // 双线性插值
                { vertexIndex: 7, demIndex: 2 },  // 插值

                // 第2行
                { vertexIndex: 8, demIndex: 3 },  // 插值
                { vertexIndex: 9, demIndex: 3 },  // 双线性插值
                { vertexIndex: 10, demIndex: 4 }, // 双线性插值
                { vertexIndex: 11, demIndex: 5 }, // 插值

                // 第3行
                { vertexIndex: 12, demIndex: 6 }, // 左下角
                { vertexIndex: 13, demIndex: 6 }, // 插值
                { vertexIndex: 14, demIndex: 7 }, // 插值
                { vertexIndex: 15, demIndex: 8 }  // 右下角
            ];

            // 应用高度值
            demMap.forEach(({ vertexIndex, demIndex }) => {
                vertices[vertexIndex * 3 + 2] = (data[demIndex] - minElevation) / (maxElevation - minElevation)
            });
            positionAttribute.needsUpdate = true;
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongMaterial({
                color: 0x00ff00,
                wireframe: true, // 可选：显示线框以便调试
                side: THREE.DoubleSide
            });


            terrainMesh = new THREE.Mesh(geometry, material);
            terrainMesh.rotation.x = -Math.PI / 2;
            scene.add(terrainMesh);

            controls.reset();
        }

        $('#fileInput').on('change', HD1)

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
