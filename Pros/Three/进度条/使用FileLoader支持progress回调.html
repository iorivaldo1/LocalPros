<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>天地图加载GeoServer WMS</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <script src="/Public/js/geoTools.js"></script>
    <script src="/Public/js/three.min.js"></script>
    <script src="/Public/js/OrbitControls.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <script src="/Public/js/three_shaders.js"></script>
    <script src="/Public/js/three_utills.js"></script>
    <script src="/Public/lib/layui-v2.9.21/layui.js"></script>
    <link rel="stylesheet" href="/Public/lib/layui-v2.9.21/css/layui.css">
    <link rel="icon" href="/Public/imgs/H.ico">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #map {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #treeCon1 {
            position: absolute;
            top: 20px;
            right: 100px;
            width: 500px;
            height: 500px;
            background-color: rgba(136, 147, 161, 0.3);
            z-index: 450;
            visibility: hidden;
        }

        #btn1 {
            position: absolute;
            bottom: 100px;
            left: 20px;
            z-index: 450;
            width: 50px;
            height: 200x;
        }

        #btn2 {
            position: absolute;
            top: 10px;
            right: 20px;
            z-index: 460;
            width: 25px;
            height: 25px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <button id="btn1">T</button>
    <div id="treeCon1">
        <button id="btn2">X</button>
    </div>
    <script>
        layui.use('layer', function () {
            var layer = layui.layer
        })

        setSourceBounds('http://localhost:8080/geoserver/WMS_DEM/wms?REQUEST=GetCapabilities', 'DEM_YA_COP')
        setSourceBounds('http://localhost:8080/geoserver/WMS_DOM/wms?REQUEST=GetCapabilities', 'ya')
        var map = new T.Map('map', { tileSize: 512 });
        map.centerAndZoom(new T.LngLat(103, 30), 14);
        var ctrl = new T.Control.MapType(
            { position: T_ANCHOR_BOTTOM_RIGHT }
        );
        map.addControl(ctrl);
        var recTool = new T.RectangleTool(map, { showLabel: false });;
        const [scene, camera] = createScene($('#treeCon1'));
        $('#btn1').on('click', HD1)
        function HD1() {
            recTool.removeEventListener('draw');
            recTool.clear();
            recTool.open();
            recTool.addEventListener('draw', (e) => {
                var dem_COP_URL = createDEMWMSUrl('http://localhost:8080/geoserver/WMS_DEM/wms?', e)
                var [dom_ya_URL, x_range, y_range] = createDOMUrl('http://localhost:8080/geoserver/WMS_DOM/wms?', e)

                if (x_range >= 0.08 || y_range >= 0.08) {
                    layer.alert('框选范围过大！请重新选择范围');
                    recTool.clear();
                    return;
                }

                var loadIndex = layer.msg('数据加载中', {
                    icon: 16,
                    shade: 0.01,
                    time: false
                });;
                // const textureLoader = new THREE.TextureLoader();
                const textureLoader = nLoader();

                textureLoader.load(
                    dom_ya_URL,
                    function (texture) {
                        var ex_mesh = getMeshByName(scene, 'mesh_cop')
                        if (ex_mesh) {
                            scene.remove(ex_mesh);
                            ex_mesh.geometry.dispose();
                            ex_mesh.material.dispose();
                        }
                        fetch(dem_COP_URL).then(res => {
                            return loadDEMFromGeoServer(res, scene, camera, 'mesh_cop')
                        }).then((mesh) => {
                            mesh.material.map = texture
                            mesh.material.side = THREE.DoubleSide
                            mesh.material.needsUpdate = true
                        }).then(() => {
                            layer.close(loadIndex)
                            $('#treeCon1').css('visibility', 'visible')
                        })
                    },

                    function (xhr) {
                        console.log('cc')
                    },

                )
            })
        }

        function nLoader() {
            return {
                load: function (url, onLoad, onProgress, onError) {
                    const fileLoader = new THREE.FileLoader();
                    fileLoader.setResponseType('blob');

                    return fileLoader.load(
                        url,
                        function (blob) {
                            const imageLoader = new THREE.ImageLoader();
                            imageLoader.load(
                                URL.createObjectURL(blob),
                                function (image) {
                                    const texture = new THREE.Texture(image);
                                    texture.needsUpdate = true;
                                    URL.revokeObjectURL(blob);

                                    if (onLoad) onLoad(texture);
                                },
                                undefined, // 图像加载进度（通常不支持）
                                function (error) {
                                    if (onError) onError(error);
                                }
                            );
                        },
                        function (xhr) {
                            console.log('b - 下载进度:',
                                xhr.lengthComputable ?
                                    `${(xhr.loaded / xhr.total * 100).toFixed(1)}%` :
                                    `${xhr.loaded} bytes loaded`);

                            if (onProgress) onProgress(xhr);
                        },
                        function (error) {
                            if (onError) onError(error);
                        }
                    );
                }
            };
        }

        $('#btn2').on('click', function () {
            var ex_mesh = getMeshByName(scene, 'mesh_cop')
            if (ex_mesh) {
                scene.remove(ex_mesh);
                ex_mesh.geometry.dispose();
                ex_mesh.material.dispose();
            }
            $('#treeCon1').css('visibility', 'hidden')
            recTool.clear();
        })
    </script>
</body>

</html>
