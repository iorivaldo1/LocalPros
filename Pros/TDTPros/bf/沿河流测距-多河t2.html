<!DOCTYPE html>
<html lang="en">

<head>
    <title>QSKJ_LOCAL</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/utilsForTianditu.js"></script>
    <style>
        #mapDiv {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height: 100%;
            /* min-height: calc(100vh - 50px); */
        }

        .test {
            position: absolute;
            bottom: 100px;
            z-index: 450;
        }

        #addPoint {
            left: 50px;
        }

        #cal {
            left: 120px;
        }

        #close {
            left: 162px;
        }
    </style>
</head>

<body>
    <div id="mapDiv">
        <button class="test" id="addPoint">添加点位</button>
        <button class="test" id="cal">计算</button>
        <button class="test" id="close">关闭</button>
    </div>
    <script>
        var icon = new T.Icon({
            iconUrl: "/Public/imgs/marker-icon.png",
            iconSize: new T.Point(19, 27),
            iconAnchor: new T.Point(10, 25)
        });

        var icon_proj = new T.Icon({
            iconUrl: "/Public/imgs/marker-icon2.png",
            iconSize: new T.Point(25, 25),
            iconAnchor: new T.Point(10, 25)
        });

        var map = new T.Map("mapDiv")
        var zoom = 17;
        var markerList = []
        var marker_proList = []
        var line_proList = []
        var m_polyline = [];
        var m_polyline_list = []
        var marker_proj_indexList = []
        var marker_proj_coordList = []
        map.centerAndZoom(new T.LngLat(103.0253,29.9967), zoom);
        map.disableDoubleClickZoom(); //禁用双击地图放大
        $.get("/Public/data/river.json").then(function (data) {
            data.features.forEach(feature => {
                m_polyline = [feature.geometry.paths[0],feature.attributes.name]
                var points = []
                feature.geometry.paths[0].forEach(point => {
                    points.push(new T.LngLat(point[0], point[1]))
                })
                var line = new T.Polyline(points, {
                    color: "#0080ff",
                    weight: 2,
                    opacity: 1.0,
                    lineStyle: "dashed",
                });
                m_polyline_list.push(m_polyline)
                map.addOverLay(line);
            })
        })
        $("#addPoint").click(function () {
            setTimeout(function () {
                // map.removeEventListener("click", MapClick(te));
                map.addEventListener("click", MapClick(m_polyline_list));
            }, 50);

        })

        $("#cal").click(function () {
            map.removeEventListener("click");
            var r_c_count = 0;
            var m_polyline_nearest_list = []
            markerList.forEach(marker => {
                const point = [marker.getLngLat().lng, marker.getLngLat().lat]
                var disProj_s = Infinity;
                var m_polyline_nearest;
                var r_nearest_name = "";
                m_polyline_list.forEach(m_polyline_attr => {
                    const disProj = getProjectionPointWithIndex(m_polyline_attr[0], point).distanceSq
                    if (disProj < disProj_s) {
                        disProj_s = disProj
                        m_polyline_nearest = m_polyline_attr;
                        r_nearest_name = m_polyline_attr[1]
                    }
                })
                if(!m_polyline_nearest_list.includes(m_polyline_nearest)){
                    m_polyline_nearest_list.push(m_polyline_nearest)
                    r_c_count +=1
                }
                const projection = getProjectionPointWithIndex(m_polyline_nearest[0], point).projection;
                const p_index = getProjectionPointWithIndex(m_polyline_nearest[0], point).index
                var marker = new T.Marker(new T.LngLat(projection[0], projection[1]), { icon: icon_proj });
                map.addOverLay(marker);
                marker_proList.push(marker)
            })
            if(r_c_count < 2){
                var m_polyline = m_polyline_nearest_list[0]
                calRivPolyLineWithRiverName(markerList, m_polyline)
            }
            else{
                calRivPolyLineWithRiverName(markerList, m_polyline_nearest_list[1])
            }
        })
       
        $("#close").click(function () {
            map.removeEventListener("click");
            markerList.forEach(marker => {
                map.removeOverLay(marker)
            })
            marker_proList.forEach(marker_pro => {
                map.removeOverLay(marker_pro)
            })
            line_proList.forEach(line_pro => {
                map.removeOverLay(line_pro)
            })
            marker_proj_indexList = []
            markerList = []
            marker_proj_coordList = []
        })
        function MapClick(riverPolylineList) {
            return function (e) {
                var marker = new T.Marker(new T.LngLat(e.lnglat.lng, e.lnglat.lat), { icon: icon });
                var marker_riv_name = getMarkerPro(marker, riverPolylineList)
                map.addOverLay(marker);
                markerList.push(marker)
            }
        }
    </script>
</body>

</html>
