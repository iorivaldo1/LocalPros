<!DOCTYPE html>
<html lang="en">

<head>
    <title>TianDiTu</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <script src="/Public/js/geoTools.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shpjs@latest/dist/shp.min.js"></script>
    <script src="/Public/js/shp.min.js"></script>
    <script src="/Public/js/dom-to-image.min.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #mapDiv {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .map-btn {
            position: absolute;
            bottom: 50px;
            left: 20px;
            z-index: 450;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .map-btn button {
            padding: 6px 10px;
            cursor: pointer;
        }
        #shpFileInput {
            display: none;
        }
    </style>
</head>

<body>
    <div id="mapDiv">
        <div class="map-btn">
            <button id="loadShp">
                <img src="/Public/imgs/H.ico" alt="Load Shp" style="width:16px; height:16px; ">
            </button>
        </div>
        <input id="shpFileInput" type="file" accept=".zip,.shp,.dbf" multiple>
    </div>

    <script type="module">
        var map = new T.Map("mapDiv")
        var zoom = 5;
        map.centerAndZoom(new T.LngLat(103, 33), zoom);


        $('#getLocation').on('click', function () {
            navigator.geolocation.getCurrentPosition(function (pos) {
                const jd = pos.coords.longitude; // 经度
                const wd = pos.coords.latitude;   // 纬度
                map.centerAndZoom(new T.LngLat(jd, wd), 18);
                const point_lnglat = new T.LngLat(jd, wd)
                marker.setLngLat(point_lnglat)
                map.addOverLay(marker)

                const label = new T.Label({
                    text: `${jd.toFixed(5)},${wd.toFixed(5)}`,
                    position: marker.getLngLat(),
                    offset: new T.Point(3, -30),
                });
                map.addOverLay(label)
            })
        })

        const shpInput = $('#shpFileInput')
        $('#loadShp').on('click', () => shpInput.trigger('click'))

        shpInput.on('change', async (event) => {
            const files = Array.from(event.target.files || [])
            if (!files.length) return

            try {
                const geojson = await readShpFiles(files)
                if (!geojson.features || !geojson.features.length) {
                    alert('未读取到有效的面要素')
                    return
                }
                await iterateFeatures(geojson.features)
            } catch (err) {
                console.error(err)
                alert('读取shp失败，请检查文件是否为有效的shp/zip')
            } finally {
                shpInput.val('')
            }
        })

        function fileToArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader()
                reader.onload = () => resolve(reader.result)
                reader.onerror = reject
                reader.readAsArrayBuffer(file)
            })
        }

        async function readShpFiles(files) {
            const zipFile = files.find(f => /\.zip$/i.test(f.name))
            if (zipFile) {
                const ab = await fileToArrayBuffer(zipFile)
                return await shp(ab)
            }

            const shpFile = files.find(f => /\.shp$/i.test(f.name))
            if (!shpFile) throw new Error('需要选择shp文件')
            const dbfFile = files.find(f => /\.dbf$/i.test(f.name))

            const shpBuffer = await fileToArrayBuffer(shpFile)
            const shpGeoms = await shp.parseShp(shpBuffer)
            if (dbfFile) {
                const dbfBuffer = await fileToArrayBuffer(dbfFile)
                const dbfProps = await shp.parseDbf(dbfBuffer)
                return shp.combine([shpGeoms, dbfProps])
            }

            const features = shpGeoms.map((geom, idx) => ({
                type: 'Feature',
                geometry: geom,
                properties: { FID: idx }
            }))
            return { type: 'FeatureCollection', features }
        }

        async function iterateFeatures(features) {
            for (let i = 1927; i < features.length; i++) {
                const feature = features[i]
                const ring = getOuterRing(feature.geometry)
                if (!ring.length) continue
                const view = ring.map(([lng, lat]) => new T.LngLat(lng, lat))

                // 先设置视图，再等待地图稳定
                if (typeof setViewport === 'function') {
                    setViewport(view)
                } else {
                    map.setViewport(view)
                }

                await waitMapStable()
                await saveMapImage(resolveFid(feature, i))
            }
        }

        function getOuterRing(geometry) {
            if (!geometry) return []
            if (geometry.type === 'Polygon') return geometry.coordinates[0] || []
            if (geometry.type === 'MultiPolygon') {
                const polys = geometry.coordinates || []
                const target = polys.reduce((best, poly) => {
                    const ring = (poly && poly[0]) || []
                    return ring.length > best.length ? ring : best
                }, [])
                return target
            }
            return []
        }

        function resolveFid(feature, idx) {
            const props = feature.properties || {}
            return props.FID ?? props.fid ?? idx
        }

        function waitMapStable(timeout = 1500) {
            return new Promise((resolve) => {
                // 简单等待固定时间，确保地图视图切换和瓦片加载完成
                setTimeout(resolve, timeout)
            })
        }

        async function saveMapImage(fid) {
            const node = document.getElementById('mapDiv')
            const dataUrl = await domtoimage.toPng(node)
            
            try {
                const response = await fetch('http://localhost:3000/save-image', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        imageData: dataUrl,
                        filename: `${fid}.png`
                    })
                })
                
                const result = await response.json()
                if (result.success) {
                    console.log(`图片已保存到: ${result.path}`)
                } else {
                    console.error('保存失败:', result.error)
                    alert(`保存失败: ${result.error}`)
                }
            } catch (error) {
                console.error('保存图片出错:', error)
                alert(`保存图片出错: ${error.message}`)
            }
        }
    </script>
</body>

</html>
