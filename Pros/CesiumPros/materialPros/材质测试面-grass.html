        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain(),

        const rectangle = new Cesium.RectangleGeometry({
            ellipsoid: Cesium.Ellipsoid.default,
            rectangle: Cesium.Rectangle.fromDegrees(90.0, 25, 110, 40),
            height: 10000.0
        });
        const geometry = Cesium.RectangleGeometry.createGeometry(rectangle);

        const materialAppearance = new Cesium.MaterialAppearance({
            material: new Cesium.Material({
                fabric: {
                    type: 'Color',
                    uniforms: {
                        grassColor: new Cesium.Color(0.25, 0.4, 0.1, 1.0),
                        dirtColor: new Cesium.Color(0.1, 0.1, 0.1, 1.0),
                        patchiness: 1.5
                    },
                    source: shaderGrass
                }
            })
        });

        const myPrimitive1 = new Cesium.Primitive({
            geometryInstances: new Cesium.GeometryInstance({
                geometry: geometry
            }),
            appearance: materialAppearance
        })

        viewer.scene.primitives.add(myPrimitive1);

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(102.7469, 30.2048, 20000000),
            duration: 0
        })
