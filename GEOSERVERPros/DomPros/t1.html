<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>天地图加载GeoServer WMS</title>
    <script src="/Public/js/tianditu.api.js"></script>
    <script src="/Public/js/jquery-3.7.1.min.js"></script>
    <script src="/Public/js/geotiff.js"></script>
    <link rel="icon" href="/Public/imgs/H.ico">
    <style>
        #map {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height: 100%;
        }

        #btn1 {
            position: absolute;
            bottom: 100px;
            left: 20px;
            z-index: 450;
            width: 50px;
            height: 20px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <button id="btn1">T</button>
    <script>
        var map = new T.Map('map', { tileSize: 512 });
        map.centerAndZoom(new T.LngLat(102.607, 30.652), 12);



        $('#btn1').on('click', HD1)
        function HD1() {
            var imageURL =
                'http://localhost:8080/geoserver/WMS_DOM/wms?' +
                'Request=GetMap' +
                '&Service=WMS' +
                '&Version=1.1.0' +
                '&LAYERS=WMS_DOM%3AtestDOM' +
                '&STYLE=' +
                '&BBOX=99.399667368486%2C30.3057032683858%2C99.4010236612594%2C30.307023869244' +
                '&WIDTH=768' +
                '&HEIGHT=746' +
                '&SRS=EPSG%3A4326' +
                '&FORMAT=image%2Fgeotiff' +
                '&TRANSPARENT=true'

            async function parseGeoTiff(arrayBuffer) {
                console.log(arrayBuffer)

                const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                const image = await tiff.getImage();
                const width = image.getWidth();
                const height = image.getHeight();
                console.log(width, height)
            }


            fetch(imageURL).then(res => {
                return res.arrayBuffer()
            }).then(arrayBuffer => {
                parseGeoTiff(arrayBuffer)
            })


        }
    </script>
</body>

</html>
